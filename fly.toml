# fly.toml app configuration file generated for flesh-pulse on 2026-06-14T22:44:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'flesh-pulse'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[services]]
  internal_port = 8081
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 8081
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 8443

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
